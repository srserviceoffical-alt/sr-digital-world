<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facebook Followers & Growth | SR Digital World</title>
<meta name="description" content="Boost your social media presence with our organic Facebook follower packages.">
<link rel="icon" type="image/png" href="https://drive.google.com/thumbnail?id=1u0VNmKGzMIuxk0bxZMqAgWCU4G5OiTtU&sz=w256">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a0f;color:#e8e8f0;font-family:'Inter',sans-serif;overflow-x:hidden}
  html { scroll-behavior: smooth; }
  
  .page-hero{padding:80px 0 60px;background:#000;text-align:center;border-bottom:1px solid #1a1a25;position:relative;overflow:hidden}
  .page-hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 50% 50% at 50% 0%,rgba(255,140,0,0.1) 0%,transparent 70%)}
  .section-eyebrow{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#FF8C00;margin-bottom:12px}
  .section-title{font-size:clamp(2rem,4vw,3.2rem);font-weight:900;color:#fff;letter-spacing:-1px;line-height:1.1}
  
  .content-section{padding:70px 0;background:#0a0a0f}
  .service-card{background:#111118;border:1px solid #1e1e2a;border-radius:20px;padding:40px; margin-top: 30px;}
  .order-btn{display:inline-flex;align-items:center;gap:8px;background:#FF8C00;color:#000;padding:14px 28px;border-radius:100px;font-weight:700;font-size:15px;text-decoration:none;transition:all 0.3s;border:none;cursor:pointer;margin-top:20px;}
  .order-btn:hover{background:#FFB347;transform:translateY(-2px);box-shadow:0 10px 30px rgba(255,140,0,0.4)}
</style>
</head>
<body>

<div id="navbar-placeholder"></div>

<section class="page-hero">
  <div class="page-hero-bg"></div>
  <div class="container" style="position:relative">
    <div class="section-eyebrow">Social Media Growth</div>
    <h1 class="section-title">Facebook Followers</h1>
    <p style="color:#666;font-size:16px;margin-top:16px;max-width:600px;margin-left:auto;margin-right:auto">Grow your page organically with fast, secure, and reliable follower packages.</p>
  </div>
</section>

<section class="content-section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="service-card text-center">
          <h3 style="color:#fff;font-weight:800;margin-bottom:20px">Boost Your Page Authority</h3>
          <p style="color:#aaa;line-height:1.7;margin-bottom:30px">Detail your drop guarantees, follower quality, timeframes, and package prices here.</p>
          
          <a href="https://wa.me/923229952880?text=Hello! I need details about your Facebook Followers service." target="_blank" class="order-btn">
            <i class="fa-brands fa-whatsapp"></i> Chat with Us to Order
          </a>
        </div>
      </div>
    </div>
  </div>
</section>

<script>
// ========================================================
// REFINED NAVBAR LOADING & HIGHLIGHT SCRIPT
// ========================================================
fetch('navbar.html')
  .then(response => response.text())
  .then(data => {
    document.getElementById('navbar-placeholder').innerHTML = data;
    
    // Highlight Active Page
    let currentUrl = window.location.pathname.split('/').pop();
    if(currentUrl === '') currentUrl = 'index.html';
    
    let navLinks = document.querySelectorAll('.nav-link-item');
    navLinks.forEach(link => {
      link.classList.remove('active');
      if(link.getAttribute('href') === currentUrl) {
        link.classList.add('active');
      }
    });

    // Khaas tor par Facebook Followers page ke liye "Services" ko active karna
    if (currentUrl === "cv-writing.html" || currentUrl === "facebook-followers.html") {
      let serviceMenu = document.querySelector('.dropdown > .nav-link-item');
      if(serviceMenu) serviceMenu.classList.add('active');
    }
  });

// Mobile Menu & Dropdown Functions
function toggleMobileMenu() {
  let menu = document.getElementById('mobileMenu');
  if(menu) menu.classList.toggle('show-menu');
}

function toggleDropdown() {
  if(window.innerWidth <= 991) {
    let drop = document.getElementById("servicesDropdown");
    if(drop) drop.classList.toggle("show-mobile");
  }
}
</script>
</body>
</html>
